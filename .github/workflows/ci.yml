# Github CI workflow setup
name: CI

# Execute the workflow when code is pushed,
# or when a pull request is updated
on:
  push:
  pull_request:

jobs:
  test:
    # Use Linux to execute the workflow
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest