services:
  
  # PostgreSQL service setup
  db:
    image: postgres:17
    container_name: job-tracker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_tracker
    ports:
      - "5432:5432"
    # Wait until PostgreSQL is ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI app service setup
  app:
    build: .
    container_name: job-tracker-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/job_tracker
    depends_on:
      # Start the app only after db passes healthcheck
      db:
        condition: service_healthy